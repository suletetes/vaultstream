name: Deploy to Production

on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: us-east-1
  ENV_PREFIX: vaultstream-prod

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - run: npm ci

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get AWS Account ID
        id: account
        run: echo "id=$(aws sts get-caller-identity --query Account --output text)" >> "$GITHUB_OUTPUT"

      - name: Pre-Deploy Backup — RDS Snapshot
        run: |
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          aws rds create-db-snapshot \
            --db-instance-identifier ${{ env.ENV_PREFIX }}-audit-db \
            --db-snapshot-identifier "pre-deploy-${TIMESTAMP}" || true
          echo "RDS snapshot requested: pre-deploy-${TIMESTAMP}"

      - name: Pre-Deploy Backup — DynamoDB
        run: |
          aws dynamodb create-backup \
            --table-name ${{ env.ENV_PREFIX }}-metadata \
            --backup-name "pre-deploy-$(date +%Y%m%d-%H%M%S)" || true
          echo "DynamoDB backup requested"

      - name: Build Packages
        run: npm run build --workspaces --if-present

      - name: CDK Diff (Review)
        working-directory: infra
        run: npx cdk diff --all --context env=prod

      - name: CDK Deploy
        working-directory: infra
        run: npx cdk deploy --all --context env=prod --require-approval never

      - name: Build Frontend
        working-directory: packages/frontend
        run: npm run build

      - name: Sync Frontend to S3
        run: |
          BUCKET="${{ env.ENV_PREFIX }}-frontend-${{ steps.account.outputs.id }}"
          echo "Syncing to s3://${BUCKET}/"
          aws s3 sync packages/frontend/dist/ "s3://${BUCKET}/" --delete

      - name: Invalidate CloudFront
        if: ${{ env.CLOUDFRONT_DISTRIBUTION_ID != '' }}
        env:
          CLOUDFRONT_DISTRIBUTION_ID: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "$CLOUDFRONT_DISTRIBUTION_ID" \
            --paths "/*"

      - name: Post-Deploy Verification
        run: |
          API_URL="${{ secrets.API_URL }}"
          if [ -z "$API_URL" ]; then
            API_URL=$(aws cloudformation describe-stacks \
              --stack-name ${{ env.ENV_PREFIX }}-compute \
              --query "Stacks[0].Outputs[?contains(OutputKey,'RestApi')].OutputValue" \
              --output text 2>/dev/null || echo "")
          fi
          if [ -z "$API_URL" ]; then
            echo "No API URL found, skipping verification"
            exit 0
          fi
          HEALTH_URL="${API_URL}health"
          echo "Waiting 30s for deployment to stabilize..."
          sleep 30
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$HEALTH_URL" || echo "000")
          if [ "$STATUS" != "200" ]; then
            echo "::error::Post-deploy verification failed: $STATUS"
            exit 1
          fi
          echo "Production deployment verified successfully"

      - name: Rollback on Failure
        if: failure()
        env:
          CLOUDFRONT_DISTRIBUTION_ID: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}
        run: |
          echo "::error::Production deployment failed — initiating rollback"
          # Attempt CloudFormation rollback for any stacks in failed state
          STACKS=$(aws cloudformation list-stacks \
            --stack-status-filter UPDATE_ROLLBACK_COMPLETE UPDATE_COMPLETE \
            --query "StackSummaries[?contains(StackName,'${{ env.ENV_PREFIX }}')].StackName" \
            --output text 2>/dev/null || echo "")
          for STACK in $STACKS; do
            echo "Rolling back stack: $STACK"
            aws cloudformation rollback-stack --stack-name "$STACK" || true
          done
          # Invalidate CloudFront to serve rolled-back content
          if [ -n "$CLOUDFRONT_DISTRIBUTION_ID" ]; then
            aws cloudfront create-invalidation \
              --distribution-id "$CLOUDFRONT_DISTRIBUTION_ID" \
              --paths "/*" || true
          fi
          echo "Rollback initiated. Manual verification required."
