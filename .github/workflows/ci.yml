name: CI Pipeline

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  id-token: write

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type Check
        run: npm run typecheck

      - name: Unit Tests
        run: npx vitest run --coverage

      - name: Check Coverage Gate (80%)
        run: |
          COVERAGE=$(node -e "const j=JSON.parse(require('fs').readFileSync('coverage/coverage-summary.json','utf8'));console.log(j.total.lines.pct)")
          echo "Coverage: ${COVERAGE}%"
          node -e "const c=parseFloat(process.argv[1]); if(isNaN(c)||c<80){console.error('Coverage below 80%: '+c+'%');process.exit(1)}" "$COVERAGE"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - run: npm ci

      - name: NPM Audit
        run: npm audit --audit-level=high

      - name: Trivy Filesystem Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          severity: 'HIGH,CRITICAL'
          exit-code: '1'
