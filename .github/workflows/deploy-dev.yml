name: Deploy to Development

on:
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: us-east-1
  ENV_PREFIX: vaultstream-dev

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: development
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - run: npm ci

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get AWS Account ID
        id: account
        run: echo "id=$(aws sts get-caller-identity --query Account --output text)" >> "$GITHUB_OUTPUT"

      - name: Build Packages
        run: npm run build --workspaces --if-present

      - name: CDK Diff
        working-directory: infra
        run: npx cdk diff --all --context env=dev

      - name: CDK Deploy
        working-directory: infra
        run: npx cdk deploy --all --context env=dev --require-approval never

      - name: Bundle Lambda Code
        run: npm run bundle:lambdas

      - name: Deploy Lambda Code
        run: node scripts/deploy-lambda-code.mjs --prefix ${{ env.ENV_PREFIX }} --region ${{ env.AWS_REGION }}

      - name: Build Sharp Layer
        run: node scripts/build-sharp-layer.mjs

      - name: Deploy Sharp Layer
        run: node scripts/deploy-sharp-layer.mjs --prefix ${{ env.ENV_PREFIX }} --region ${{ env.AWS_REGION }}

      - name: Build Frontend
        working-directory: packages/frontend
        run: npm run build

      - name: Sync Frontend to S3
        run: |
          BUCKET="${{ env.ENV_PREFIX }}-frontend-${{ steps.account.outputs.id }}"
          echo "Syncing to s3://${BUCKET}/"
          aws s3 sync packages/frontend/dist/ "s3://${BUCKET}/" --delete

      - name: Invalidate CloudFront (if distribution exists)
        if: ${{ env.CLOUDFRONT_DISTRIBUTION_ID != '' }}
        env:
          CLOUDFRONT_DISTRIBUTION_ID: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "$CLOUDFRONT_DISTRIBUTION_ID" \
            --paths "/*"

      - name: Smoke Tests
        run: |
          # Get API URL from CDK outputs
          API_URL="${{ secrets.API_URL }}"
          if [ -z "$API_URL" ]; then
            API_URL=$(aws cloudformation describe-stacks \
              --stack-name ${{ env.ENV_PREFIX }}-compute \
              --query "Stacks[0].Outputs[?OutputKey=='RestApiUrl'].OutputValue | [0]" \
              --output text 2>/dev/null || echo "")
          fi
          if [ -z "$API_URL" ] || [ "$API_URL" = "None" ]; then
            echo "No API URL found, skipping smoke test"
            exit 0
          fi
          # Ensure trailing slash
          API_URL="${API_URL%/}/"
          HEALTH_URL="${API_URL}health"
          echo "Testing: ${HEALTH_URL}"
          # Retry up to 3 times with 10s waits (Lambda cold start in VPC)
          for i in 1 2 3; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "$HEALTH_URL" || echo "000")
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Smoke test passed"
              exit 0
            fi
            if [ "$i" -lt 3 ]; then
              echo "Waiting 10s before retry..."
              sleep 10
            fi
          done
          echo "::warning::Smoke test returned $STATUS after 3 attempts (may be VPC cold start). Deployment succeeded."

      - name: Rollback on Failure
        if: failure()
        run: |
          echo "::error::Deployment to dev failed. Manual intervention may be required."
